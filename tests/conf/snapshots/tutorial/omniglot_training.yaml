experiment:
  config:
    do_eval: false
    do_train: true
    monty_config:
      monty_class: ${monty.class:tbp.monty.frameworks.models.graph_matching.MontyForGraphMatching}
      monty_args:
        num_exploratory_steps: 1000
        min_eval_steps: ${constants.min_eval_steps}
        min_train_steps: 3
        max_total_steps: 2500
      motor_system_config:
        _target_: tbp.monty.frameworks.models.motor_system.MotorSystem
        policy_selector:
          _target_: tbp.monty.frameworks.models.motor_policy_selectors.SinglePolicySelector
          policy:
            _target_: ${monty.class:tbp.monty.frameworks.models.motor_policies.InformedPolicyRandomWalk}
            agent_id: agent_id_0
            action_sampler:
              _target_: tbp.monty.frameworks.actions.action_samplers.ConstantSampler
              actions:
              - ${monty.class:tbp.monty.frameworks.actions.actions.LookUp}
              - ${monty.class:tbp.monty.frameworks.actions.actions.LookDown}
              - ${monty.class:tbp.monty.frameworks.actions.actions.TurnLeft}
              - ${monty.class:tbp.monty.frameworks.actions.actions.TurnRight}
              rotation_degrees: 1.0
      learning_modules:
        learning_module_0:
          _target_: tbp.monty.frameworks.models.displacement_matching.DisplacementGraphLM
          k: 5
          match_attribute: displacement
      sensor_modules:
        sensor_module_0:
          _target_: tbp.monty.frameworks.models.sensor_modules.CameraSM
          sensor_module_id: patch
          features:
          - pose_vectors
          - pose_fully_defined
          - on_object
          - principal_curvatures_log
          save_raw_obs: false
          pc1_is_pc2_threshold: 1
        sensor_module_1:
          _target_: tbp.monty.frameworks.models.sensor_modules.Probe
          sensor_module_id: view_finder
          save_raw_obs: false
      sm_to_agent_dict:
        patch: agent_id_0
        view_finder: agent_id_0
      sm_to_lm_matrix:
      - - 0
      lm_to_lm_matrix: null
      lm_to_lm_vote_matrix: null
    environment:
      env_init_func: ${monty.class:tbp.monty.frameworks.environments.two_d_data.OmniglotEnvironment}
      env_init_args: {}
      transform:
      - _target_: tbp.monty.frameworks.environment_utils.transforms.DepthTo3DLocations
        agent_id: agent_id_0
        sensor_ids:
        - patch
        resolutions: ${np.array:[[10, 10]]}
        world_coord: true
        zooms: 1
        get_all_points: true
        use_semantic_sensor: false
        depth_clip_sensors:
        - 0
        clip_value: 1.1
    train_env_interface_args:
      alphabets:
      - 0
      - 0
      - 0
      - 1
      - 1
      - 1
      characters:
      - 1
      - 2
      - 3
      - 1
      - 2
      - 3
      versions:
      - 1
      - 1
      - 1
      - 1
      - 1
      - 1
    train_env_interface_class: ${monty.class:tbp.monty.experiment.environment.OmniglotInterface}
    logging:
      monty_log_level: SILENT
      monty_handlers: []
      wandb_handlers: []
      python_log_level: WARNING
      python_log_to_file: true
      python_log_to_stderr: true
      output_dir: ${path.expanduser:${oc.env:MONTY_MODELS}/my_trained_models}
      resume_wandb_run: false
      wandb_id:
        _target_: wandb.util.generate_id
      wandb_group: debugging
      run_name: omniglot_training
    show_sensor_output: false
    max_train_steps: 1000
    max_eval_steps: 500
    max_total_steps: 6000
    n_train_epochs: 1
    n_eval_epochs: 3
    model_name_or_path: ''
    min_lms_match: 1
    seed: 42
    supervised_lm_ids: all
  _target_: tbp.monty.frameworks.experiments.pretraining_experiments.MontySupervisedObjectPretrainingExperiment
episodes: all
num_parallel: 16
print_cfg: false
quiet_habitat_logs: true
constants:
  default_all_noise_params:
    features:
      pose_vectors: 2
      hsv: 0.1
      principal_curvatures_log: 0.1
      pose_fully_defined: 0.01
    location: 0.002
  default_sensor_features:
  - pose_vectors
  - pose_fully_defined
  - on_object
  - hsv
  - principal_curvatures_log
  min_eval_steps: 20
  pretrained_dir: ${path.expanduser:${oc.env:MONTY_MODELS}/pretrained_ycb_v12}
  compositional_pretrained_dir: ${path.expanduser:${oc.env:MONTY_MODELS}/pretrained_compositional_objects_v3}
  rotations_all_count: 14
  rotations_all:
  - - 0
    - 0
    - 0
  - - 0
    - 90
    - 0
  - - 0
    - 180
    - 0
  - - 0
    - 270
    - 0
  - - 90
    - 0
    - 0
  - - 90
    - 180
    - 0
  - - 35
    - 45
    - 0
  - - 325
    - 45
    - 0
  - - 35
    - 315
    - 0
  - - 325
    - 315
    - 0
