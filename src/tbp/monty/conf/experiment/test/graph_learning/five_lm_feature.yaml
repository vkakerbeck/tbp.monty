# @package _global_

defaults:
  - /monty: graph_exp10_e3_t3_tot2500
  - /monty/motor_system_config: test_predefined
  - /monty/learning_module: test_feature_5lm_mmd001_tol_p_hsv_pcl
  - /monty/sensor_module: 5sm_camera
  - /monty/connectivity: 5lm_5sm
  - /environment: test_habitat_dist_agent_sensors5
  - /env_interface: test_train_2obj_predefined_eval_1obj_predefined
  - /env_interface/transform: missing_depthto3d_sensor6
