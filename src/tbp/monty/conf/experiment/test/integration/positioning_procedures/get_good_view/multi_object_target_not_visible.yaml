# @package _global_

defaults:
  - /monty: graph_exp20_e3_t3_tot2500
  - /monty/motor_system_config: informed_random_walk_5
  - /monty/learning_module: displacement_1lm
  - /monty/sensor_module: camera_dist
  - /monty/connectivity: 1lm_1sm
  - /environment: habitat_dist_agent_semantics1
  - /env_interface: test_train_2obj_predefined_eval_distractors_cubeSolid_predefined
  - /env_interface/positioning_procedures_train: getgoodview_mop1_viewfinder_patch
  - /env_interface/positioning_procedures_eval: getgoodview_mop1_viewfinder_patch
  - /env_interface/transform: missing_depthto3d_sensor2_semantic1
  - /logging: detailed_info_monty_runs

experiment:
  _target_: tbp.monty.frameworks.experiments.object_recognition_experiments.MontyObjectRecognitionExperiment
  config:
    show_sensor_output: false
    max_train_steps: 30
    max_eval_steps: 30
    max_total_steps: 60
    n_train_epochs: 1
    n_eval_epochs: 1
    model_name_or_path: ''
    min_lms_match: 1
    seed: 42
    supervised_lm_ids: []
    environment:
      env_init_args:
        data_path: null
    logging:
      run_name: ""
