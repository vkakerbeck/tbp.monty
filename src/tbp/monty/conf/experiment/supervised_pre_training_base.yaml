# @package _global_

defaults:
  - /monty: graph_exp500_e3_t3_tot2500
  - /monty/motor_system_config: naive_scan_5
  - /monty/learning_module: displacement_delta_d0001
  - /monty/sensor_module: camera_dist
  - /monty/connectivity: 1lm_1sm
  - /environment: habitat_ycb_dist_agent_semantics0
  - /env_interface: train_distinctobj_predefined
  - /env_interface/positioning_procedures_train: getgoodview_viewfinder_patch
  - /env_interface/transform: missing_depthto3d_sensor2_semantic0
  - /logging: silent_info_train

experiment:
  _target_: tbp.monty.frameworks.experiments.pretraining_experiments.MontySupervisedObjectPretrainingExperiment
  config:
    show_sensor_output: false
    max_train_steps: 1000
    max_eval_steps: 500
    max_total_steps: 6000
    n_train_epochs: ${constants.rotations_all_count}
    n_eval_epochs: 3
    model_name_or_path: ''
    min_lms_match: 1
    seed: 42
    supervised_lm_ids: all
    logging:
      run_name: supervised_pre_training_base
