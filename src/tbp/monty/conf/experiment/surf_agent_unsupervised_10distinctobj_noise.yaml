# @package _global_

defaults:
  - /monty: graph_exp1000_e3_t100_tot2500
  - /monty/motor_system_config: surface
  - /monty/learning_module: evidence_1lm_nn5
  - /monty/sensor_module: camera_surf_noise_raw1
  - /monty/connectivity: 1lm_1sm
  - /environment: habitat_ycb_surf_agent
  - /env_interface: train_distinctobj_random
  - /env_interface/transform: missing_depthto3d_sensor2_semantic0_clip
  - /logging: basic_info_monty_runs

experiment:
  _target_: tbp.monty.frameworks.experiments.object_recognition_experiments.MontyObjectRecognitionExperiment
  config:
    show_sensor_output: false
    max_train_steps: 4000
    max_eval_steps: 500
    max_total_steps: 4000
    n_train_epochs: 10
    n_eval_epochs: ${constants.rotations_all_count}
    model_name_or_path: ""
    min_lms_match: 1
    seed: 42
    supervised_lm_ids: []
    python_log_level: DEBUG
    logging:
      run_name: surf_agent_unsupervised_10distinctobj_noise
