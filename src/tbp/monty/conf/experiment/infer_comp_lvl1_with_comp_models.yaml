# @package _global_

defaults:
  - /monty: evidencegraph_exp1000_emin_t3_tot2500
  - /monty/motor_system_config: distant_5
  - /monty/learning_module: evidence_2lm_gsg
  - /monty/sensor_module: 2sm_camera_dist
  - /monty/connectivity: 2lm_2sm
  - /environment: habitat_dist_agent_sensors2
  - /env_interface: eval_compositional_lvl1_predefined
  - /env_interface/positioning_procedures_eval: getgoodview_viewfinder_patch0
  - /env_interface/transform: missing_depthto3d_sensor3
  - /logging: basic_warning_wandb_evidence_eval_runs

experiment:
  _target_: tbp.monty.frameworks.experiments.object_recognition_experiments.MontyObjectRecognitionExperiment
  config:
    show_sensor_output: false
    max_train_steps: 1000
    max_eval_steps: 500
    max_total_steps: 6000
    n_train_epochs: 3
    n_eval_epochs: ${constants.rotations_all_count}
    model_name_or_path: ${constants.compositional_pretrained_dir}/supervised_pre_training_objects_with_logos_lvl1_comp_models/pretrained/
    min_lms_match: 1
    seed: 42
    supervised_lm_ids: []
    python_log_level: DEBUG
    logging:
      run_name: infer_comp_lvl1_with_comp_models
