# @package experiment.config

do_train: true
train_env_interface_class: ${monty.class:tbp.monty.experiment.environment.OneObjectPerEpisodeInterface}
train_env_interface_args:
  parent_to_child_mapping: null
  object_init_sampler:
    _target_: tbp.monty.frameworks.environments.object_init_samplers.Default
  object_names:
  - capsule3DSolid
  - coneSolid
  - cubeSolid

do_eval: true
eval_env_interface_class: ${monty.class:tbp.monty.experiment.environment.OneObjectPerEpisodeInterface}
eval_env_interface_args:
  parent_to_child_mapping: null
  object_init_sampler:
    _target_: tbp.monty.frameworks.environments.object_init_samplers.Default
  object_names:
  - coneSolid
  - cubeSolid
  - cylinderSolid
